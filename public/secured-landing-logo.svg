<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" role="img" aria-labelledby="title desc">
  <title id="title">Secured Landing</title>
  <desc id="desc">Green and blue globe shield with the Secured Landing wordmark.</desc>
  <defs>
