      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="globe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <g transform="translate(8 8)">
    <path d="M82 4c30 19 51 20 72 25v49c0 48-29 74-72 94C39 152 10 126 10 78V29C31 24 52 23 82 4Z" fill="url(#shield)"/>
    <circle cx="82" cy="75" r="42" fill="url(#globe)" stroke="#ecfeff" stroke-width="5"/>
