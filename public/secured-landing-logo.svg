    <text x="214" y="54" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="700" fill="#2563eb">Landing</text>
    <text x="3" y="90" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="4" fill="#64748b">LAND-BACKED LENDING</text>
  </g>
